<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register Student — SRS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">🎓 <span>Student</span>RS</div>
    <div class="nav-links">
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('register') }}" class="active">Register</a>
      <a href="{{ url_for('students_list') }}">Students</a>
      <a href="{{ url_for('about') }}">About</a>
    </div>
  </nav>

  <div class="page">

    <h1 class="page-title">Register New Student</h1>
    <p class="page-subtitle">Fill in the details below to register a new student</p>

    {% if message %}
    <div class="alert alert-success">✅ {{ message }}</div>
    {% endif %}

    {% if error %}
    <div class="alert" style="background:rgba(255,77,109,0.12); border:1px solid var(--danger); color:var(--danger);">
      ❌ {{ error }}
    </div>
    {% endif %}

    <div class="card" style="max-width: 720px;">
      <form method="POST" action="{{ url_for('register') }}">

        <div class="form-grid-2">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="e.g. Yuvaraju" required/>
          </div>
          <div class="form-group">
            <label>Roll Number</label>
            <input type="text" name="roll" placeholder="e.g. 22AD001" required/>
          </div>
        </div>

        <div class="form-grid-2">
          <div class="form-group">
            <label>Department</label>
            <select name="dept" required>
              <option value="" disabled selected>Select Department</option>
              <option>AI & Data Science</option>
              <option>CSE</option>
              <option>ECE</option>
              <option>Mechanical</option>
              <option>Civil</option>
            </select>
          </div>
          <div class="form-group">
            <label>Year</label>
            <select name="year" required>
              <option value="" disabled selected>Select Year</option>
              <option>1st Year</option>
              <option>2nd Year</option>
              <option>3rd Year</option>
              <option>4th Year</option>
            </select>
          </div>
        </div>

        <div class="form-grid-2">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="e.g. student@veltech.edu.in" required/>
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" name="phone" placeholder="e.g. 9876543210" pattern="[0-9]{10}" maxlength="10" required/>
          </div>
        </div>

        <div class="form-group">
          <label>Gender</label>
          <div class="radio-group">
            <label><input type="radio" name="gender" value="Male" required/> Male</label>
            <label><input type="radio" name="gender" value="Female"/> Female</label>
            <label><input type="radio" name="gender" value="Other"/> Other</label>
          </div>
        </div>

        <div class="form-group">
          <label>Address</label>
          <textarea name="address" placeholder="Enter full address" required></textarea>
        </div>

        <div style="display:flex; gap:1rem; margin-top:0.5rem;">
          <button type="submit" class="btn btn-primary">Register Student</button>
          <a href="{{ url_for('students_list') }}" class="btn btn-outline">View All Students</a>
        </div>

      </form>
    </div>

  </div>

</body>
</html>
